<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0a">
  <title>Malys Journal</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.js"></script>
  <style>
    :root{
      --black:#0a0a0a;--black-light:#111;--black-card:#141414;
      --red:#e50000;--red-dim:#991111;--red-glow:rgba(229,0,0,0.15);
      --white:#e8e0d8;--white-dim:#887f77;--gray:#333;--gray-light:#555;
      --green:#22c55e;--green-dim:#166534;
      --font-heading:'Space Mono',monospace;--font-body:'IBM Plex Mono',monospace;
      --ease:cubic-bezier(0.23,1,0.32,1);
      --nav-h:56px;--safe-b:env(safe-area-inset-bottom,0px);
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;overflow:hidden}
    body{background:var(--black);color:var(--white);font-family:var(--font-body);font-weight:300;line-height:1.7;-webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none}
    body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9999}
    ::selection{background:var(--red);color:var(--black)}
    a{color:var(--red);text-decoration:none}
    input,textarea,select{user-select:text;-webkit-user-select:text}

    /* Bottom nav */
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(10,10,10,0.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid var(--gray);display:flex;padding-bottom:var(--safe-b);height:calc(var(--nav-h) + var(--safe-b))}
    .tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--white-dim);font-family:var(--font-heading);font-size:0.5rem;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:color 0.2s;padding:6px 0}
    .tab-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
    .tab-btn.active{color:var(--red)}

    /* Tab panels */
    .panel{position:fixed;top:0;left:0;right:0;bottom:calc(var(--nav-h) + var(--safe-b));overflow-y:auto;overflow-x:hidden;display:none;padding:16px;-webkit-overflow-scrolling:touch}
    .panel.active{display:block}
    .panel-header{font-family:var(--font-heading);font-size:0.7rem;letter-spacing:3px;text-transform:uppercase;color:var(--red);margin-bottom:16px;padding-top:8px}
    .panel-title{font-family:var(--font-heading);font-size:clamp(1.2rem,4vw,1.6rem);font-weight:700;margin-bottom:20px;line-height:1.3}

    /* Cards — reusable */
    .card{background:var(--black-card);border:1px solid var(--gray);padding:16px;margin-bottom:12px;transition:border-color 0.3s var(--ease)}
    .card h3{font-family:var(--font-heading);font-size:0.8rem;font-weight:700;color:var(--red);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
    .card p,.card .rich-content{font-size:0.85rem;color:var(--white-dim);line-height:1.7}
    .rich-content p{margin-bottom:8px}
    .rich-content h1,.rich-content h2,.rich-content h3{font-family:var(--font-heading);color:var(--white);margin:8px 0}
    .rich-content strong{color:var(--white);font-weight:500}
    .rich-content blockquote{border-left:2px solid var(--red-dim);padding-left:12px;font-style:italic;margin:8px 0}
    .rich-content pre{background:var(--black);border:1px solid var(--gray);padding:8px;overflow-x:auto;font-size:0.8rem;margin:8px 0}
    .rich-content code{background:var(--black);padding:2px 4px;font-size:0.8rem}
    .rich-content ul,.rich-content ol{padding-left:24px;margin:8px 0}
    .rich-content a{color:var(--red)}
    .card-date{font-size:0.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--red);margin-bottom:4px}
    .card-title{font-family:var(--font-heading);font-size:0.95rem;font-weight:700;color:var(--white);margin-bottom:8px;line-height:1.4}
    .card-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
    .tag{font-size:0.6rem;letter-spacing:1px;text-transform:uppercase;color:var(--red);border:1px solid var(--red-dim);padding:2px 6px;display:inline-block}
    .empty-msg{color:var(--white-dim);font-size:0.85rem;padding:24px 0;text-align:center}

    /* Sub-nav for sections panel */
    .sub-nav{display:flex;gap:4px;margin-bottom:16px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch}
    .sub-nav::-webkit-scrollbar{display:none}
    .sub-btn{font-family:var(--font-heading);font-size:0.55rem;letter-spacing:1px;text-transform:uppercase;border:1px solid var(--gray);background:var(--black);color:var(--white-dim);padding:6px 12px;cursor:pointer;white-space:nowrap;transition:all 0.2s}
    .sub-btn.active{border-color:var(--red);color:var(--red);background:rgba(153,17,17,0.15)}
    .sub-content{display:none}.sub-content.active{display:block}

    /* Buttons */
    .btn{font-family:var(--font-heading);font-size:0.6rem;letter-spacing:1px;text-transform:uppercase;border:1px solid var(--gray);background:var(--black);color:var(--white);padding:6px 12px;cursor:pointer;transition:all 0.2s var(--ease);touch-action:manipulation}
    .btn:active{transform:scale(0.96)}
    .btn-primary{border-color:var(--red-dim);background:var(--red-dim);color:var(--white)}
    .btn-danger{border-color:var(--gray);color:var(--white-dim)}
    .btn-danger:active{border-color:#ff4444;color:#ff4444}
    .btn-green{border-color:var(--green-dim);color:var(--green)}
    .btn-full{width:100%;text-align:center;padding:12px}
    .add-bar{margin-bottom:16px}

    /* Modal */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:200;align-items:flex-end;justify-content:center;padding:0}
    .modal-overlay.visible{display:flex}
    .modal{background:var(--black-light);border-top:1px solid var(--gray);padding:20px;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp 0.25s var(--ease)}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .modal h3{font-family:var(--font-heading);font-size:0.85rem;font-weight:700;color:var(--red);letter-spacing:1px;text-transform:uppercase;margin-bottom:16px}
    .modal label{display:block;font-size:0.65rem;letter-spacing:1px;text-transform:uppercase;color:var(--white-dim);margin-bottom:4px;font-family:var(--font-heading)}
    .modal input[type="text"],.modal input[type="color"],.modal textarea,.modal select{width:100%;background:var(--black);border:1px solid var(--gray);color:var(--white);font-family:var(--font-body);font-size:0.85rem;padding:8px 12px;margin-bottom:12px;outline:none;-webkit-appearance:none;border-radius:0}
    .modal input:focus,.modal textarea:focus,.modal select:focus{border-color:var(--red-dim)}
    .modal textarea{min-height:80px;resize:vertical;line-height:1.7}
    .modal select{cursor:pointer}
    .modal .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
    .modal .error-msg{color:var(--red);font-size:0.75rem;margin-bottom:12px;display:none}
    .modal .error-msg.visible{display:block}
    .quill-wrap{margin-bottom:12px;border:1px solid var(--gray)}
    .quill-wrap .ql-toolbar.ql-snow{background:var(--black);border:none;border-bottom:1px solid var(--gray)}
    .quill-wrap .ql-toolbar .ql-stroke{stroke:var(--white-dim)}.quill-wrap .ql-toolbar .ql-fill{fill:var(--white-dim)}
    .quill-wrap .ql-toolbar .ql-picker-label{color:var(--white-dim)}
    .quill-wrap .ql-toolbar .ql-picker-options{background:var(--black-light);border-color:var(--gray)}
    .quill-wrap .ql-toolbar .ql-picker-item{color:var(--white-dim)}
    .quill-wrap .ql-toolbar button:hover .ql-stroke{stroke:var(--red)}
    .quill-wrap .ql-toolbar button.ql-active .ql-stroke{stroke:var(--red)}
    .quill-wrap .ql-container.ql-snow{background:var(--black);border:none;color:var(--white);font-family:var(--font-body);font-size:0.85rem;min-height:150px}
    .quill-wrap .ql-editor{min-height:150px;line-height:1.7}
    .quill-wrap .ql-editor.ql-blank::before{color:var(--gray-light);font-style:italic}
    .quill-wrap .ql-snow .ql-tooltip{background:var(--black-light);border-color:var(--gray);color:var(--white)}

    /* Toast */
    .toast{position:fixed;bottom:calc(var(--nav-h) + var(--safe-b) + 12px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--black-card);border:1px solid var(--red-dim);color:var(--white);font-family:var(--font-heading);font-size:0.7rem;letter-spacing:1px;padding:8px 20px;z-index:300;opacity:0;transition:all 0.3s var(--ease);pointer-events:none;white-space:nowrap}
    .toast.visible{opacity:1;transform:translateX(-50%) translateY(0)}

    /* Hero / Studio panel */
    .hero-preview{text-align:center;margin-bottom:20px}
    .hero-preview svg{width:140px;height:210px;filter:drop-shadow(0 0 20px rgba(229,0,0,0.2))}
    .hero-canvas-preview{max-width:200px;margin:0 auto 16px;border:1px solid var(--gray);display:none}
    .hero-canvas-preview img{width:100%;display:block}
    .hero-info{text-align:center;margin-bottom:24px}
    .hero-info h1{font-family:var(--font-heading);font-size:1.5rem;font-weight:700;line-height:1.2;margin-bottom:8px}
    .hero-info h1 .red{color:var(--red)}
    .hero-info .tagline{font-size:0.85rem;color:var(--white-dim);margin-bottom:12px}
    .hero-info .status{display:inline-flex;align-items:center;gap:6px;font-size:0.7rem;color:var(--red);letter-spacing:1px;text-transform:uppercase}
    .hero-info .status::before{content:'';width:6px;height:6px;background:var(--red);border-radius:50%;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
    .studio-tools{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px}

    /* Paint editor */
    .paint-overlay{display:none;position:fixed;inset:0;z-index:250;background:var(--black);flex-direction:column}
    .paint-overlay.visible{display:flex}
    .paint-topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--gray);gap:8px;flex-shrink:0;min-height:44px}
    .paint-topbar-title{font-family:var(--font-heading);font-size:0.7rem;color:var(--red);letter-spacing:2px;text-transform:uppercase}
    .paint-canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#111;touch-action:none}
    .paint-canvas-wrap canvas{background:#111;display:block}
    .paint-toolbar{display:flex;gap:4px;padding:8px;border-top:1px solid var(--gray);flex-wrap:wrap;align-items:center;justify-content:center;flex-shrink:0;padding-bottom:calc(8px + var(--safe-b))}
    .paint-tool{width:36px;height:36px;border:1px solid var(--gray);background:var(--black);color:var(--white-dim);display:flex;align-items:center;justify-content:center;font-size:0.8rem;cursor:pointer;transition:all 0.15s}
    .paint-tool.active{border-color:var(--red);color:var(--red);background:rgba(153,17,17,0.15)}
    .paint-tool svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .paint-color{width:28px;height:28px;border:2px solid var(--gray);cursor:pointer;transition:border-color 0.15s}
    .paint-color.active{border-color:var(--white)}
    .paint-size{width:80px;height:28px;accent-color:var(--red);background:transparent;border:none;cursor:pointer}
    .paint-sep{width:1px;height:28px;background:var(--gray);margin:0 4px}

    /* SVG editor */
    .svg-editor{margin-top:16px}
    .svg-editor .color-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
    .svg-editor .color-row label{flex:1;font-size:0.7rem;color:var(--white-dim);font-family:var(--font-heading);letter-spacing:1px;text-transform:uppercase}
    .svg-editor .color-row input[type="color"]{width:44px;height:32px;padding:2px;margin:0;border:1px solid var(--gray);cursor:pointer}
    .svg-preview{text-align:center;margin:16px 0}
    .svg-preview svg{width:160px;height:240px}

    /* Settings */
    .setting-group{margin-bottom:24px}
    .setting-group h3{font-family:var(--font-heading);font-size:0.75rem;font-weight:700;color:var(--white);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--gray)}
    .setting-row{display:flex;gap:8px;margin-bottom:8px}

    /* Social link card */
    .social-card{display:flex;align-items:center;gap:12px;padding:12px 16px;border:1px solid var(--gray);background:var(--black-card);margin-bottom:8px}
    .social-card .s-icon{width:20px;height:20px;flex-shrink:0}
    .social-card .s-icon svg{width:100%;height:100%;fill:var(--red)}
    .social-card .s-info{flex:1;min-width:0}
    .social-card .s-name{font-family:var(--font-heading);font-size:0.75rem;font-weight:700;color:var(--white)}
    .social-card .s-handle{font-size:0.7rem;color:var(--white-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    /* About text */
    .about-text p{margin-bottom:12px;color:var(--white-dim);font-size:0.88rem}
    .belief-card{padding-left:16px;border-left:2px solid var(--red-dim);margin-bottom:16px}
    .belief-card h3{font-family:var(--font-heading);font-size:0.85rem;font-weight:700;color:var(--white);margin-bottom:4px}
    .belief-card p{font-size:0.8rem;color:var(--white-dim)}

    /* Footer section */
    .footer-preview{text-align:center;padding:24px 0;border-top:1px solid var(--gray);margin-top:16px}
    .footer-preview p{font-size:0.75rem;color:var(--gray-light)}
  </style>
</head>
<body>

<!-- ============================================================
     TAB PANELS
     ============================================================ -->

<!-- JOURNAL -->
<div class="panel active" id="panelJournal">
  <div class="panel-header">Journal</div>
  <div class="panel-title">thinking out loud</div>
  <div class="add-bar"><button class="btn btn-primary btn-full" onclick="openEditor('entry')">+ new entry</button></div>
  <div id="entriesList"></div>
</div>

<!-- DASHBOARD -->
<div class="panel" id="panelDashboard">
  <div class="panel-header">Dashboard</div>
  <div class="panel-title">notes, thoughts, prompts</div>
  <div class="add-bar"><button class="btn btn-primary btn-full" onclick="openEditor('tile')">+ new tile</button></div>
  <div id="tilesList"></div>
</div>

<!-- STUDIO -->
<div class="panel" id="panelStudio">
  <div class="panel-header">Studio</div>
  <div class="panel-title">your space</div>
  <div class="hero-canvas-preview" id="heroCanvasPreview"><img id="heroCanvasImg"></div>
  <div class="hero-preview" id="heroSvgPreview"></div>
  <div class="hero-info" id="heroInfo"></div>
  <button class="btn btn-full" onclick="openEditor('hero')" style="margin-bottom:8px">edit hero text</button>
  <div class="studio-tools">
    <button class="btn" onclick="openPaint()">🎨 Paint Editor</button>
    <button class="btn" onclick="openSvgEditor()">✏️ SVG Editor</button>
  </div>
  <div style="margin-top:24px">
    <div class="panel-header">About</div>
    <div class="about-text" id="aboutText"></div>
    <button class="btn" onclick="openEditor('about')" style="margin-top:8px">edit about</button>
  </div>
  <div class="footer-preview" id="footerPreview"></div>
  <button class="btn" onclick="openEditor('footer')" style="margin-top:8px">edit footer</button>
</div>

<!-- SECTIONS -->
<div class="panel" id="panelSections">
  <div class="panel-header">Sections</div>
  <div class="sub-nav" id="subNav">
    <button class="sub-btn active" onclick="showSub('beliefs')">Beliefs</button>
    <button class="sub-btn" onclick="showSub('projects')">Projects</button>
    <button class="sub-btn" onclick="showSub('games')">Games</button>
    <button class="sub-btn" onclick="showSub('resources')">Resources</button>
    <button class="sub-btn" onclick="showSub('connect')">Connect</button>
  </div>
  <div class="sub-content active" id="subBeliefs">
    <div class="add-bar"><button class="btn btn-primary btn-full" onclick="openEditor('belief')">+ add belief</button></div>
    <div id="beliefsList"></div>
  </div>
  <div class="sub-content" id="subProjects">
    <div class="add-bar"><button class="btn btn-primary btn-full" onclick="openEditor('project')">+ add project</button></div>
    <div id="projectsList"></div>
  </div>
  <div class="sub-content" id="subGames">
    <div class="add-bar"><button class="btn btn-primary btn-full" onclick="openEditor('game')">+ add game</button></div>
    <div id="gamesList"></div>
  </div>
  <div class="sub-content" id="subResources">
    <div class="add-bar"><button class="btn btn-primary btn-full" onclick="openEditor('resource')">+ add resource</button></div>
    <div id="resourcesList"></div>
  </div>
  <div class="sub-content" id="subConnect">
    <div class="add-bar"><button class="btn btn-primary btn-full" onclick="openEditor('social')">+ add link</button></div>
    <div id="socialsList"></div>
  </div>
</div>

<!-- SETTINGS -->
<div class="panel" id="panelSettings">
  <div class="panel-header">Settings</div>
  <div class="panel-title">backup & restore</div>
  <div class="setting-group">
    <h3>Data</h3>
    <div class="setting-row">
      <button class="btn btn-full" onclick="exportData()">Export All Data (JSON)</button>
    </div>
    <div class="setting-row">
      <button class="btn btn-full" onclick="document.getElementById('importFile').click()">Import (Replace)</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    </div>
    <div class="setting-row">
      <button class="btn btn-green btn-full" onclick="document.getElementById('mergeFile').click()">Merge Data</button>
      <input type="file" id="mergeFile" accept=".json" style="display:none" onchange="mergeData(event)">
    </div>
  </div>
  <div class="setting-group">
    <h3>Danger Zone</h3>
    <div class="setting-row">
      <button class="btn btn-danger btn-full" onclick="clearAllData()">Delete All Data</button>
    </div>
  </div>
  <div class="setting-group">
    <h3>About</h3>
    <p style="font-size:0.8rem;color:var(--white-dim)">Malys Journal — personal PWA. All data stored locally on this device via IndexedDB. Nothing leaves your phone.</p>
  </div>
</div>

<!-- ============================================================
     BOTTOM NAV
     ============================================================ -->
<nav class="bottom-nav">
  <button class="tab-btn active" onclick="switchTab('Journal')" id="tabJournal">
    <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    <span>Journal</span>
  </button>
  <button class="tab-btn" onclick="switchTab('Dashboard')" id="tabDashboard">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    <span>Dash</span>
  </button>
  <button class="tab-btn" onclick="switchTab('Studio')" id="tabStudio">
    <svg viewBox="0 0 24 24"><circle cx="13.5" cy="6.5" r="2.5"/><circle cx="19" cy="11.5" r="2.5"/><circle cx="17" cy="18.5" r="2.5"/><circle cx="8" cy="18" r="2.5"/><circle cx="5" cy="11.5" r="2.5"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10-4.5-10-10-10z" fill="none"/></svg>
    <span>Studio</span>
  </button>
  <button class="tab-btn" onclick="switchTab('Sections')" id="tabSections">
    <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
    <span>More</span>
  </button>
  <button class="tab-btn" onclick="switchTab('Settings')" id="tabSettings">

<script>
/* ============================================================
   INDEXEDDB
   ============================================================ */
const DB_NAME='malys_journal';const DB_VER=1;
const STORES=['settings','beliefs','tiles','projects','games','entries','resources','socials','images','svg_config'];
let db=null;

function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME,DB_VER);
    r.onupgradeneeded=function(e){
      const d=e.target.result;
      STORES.forEach(s=>{if(!d.objectStoreNames.contains(s)){
        if(s==='settings')d.createObjectStore(s,{keyPath:'key'});
        else d.createObjectStore(s,{keyPath:'id'});
      }});
    };
    r.onsuccess=function(e){db=e.target.result;res(db)};
    r.onerror=function(e){rej(e.target.error)};
  });
}
function dbPut(store,data){return new Promise((res,rej)=>{const tx=db.transaction(store,'readwrite');tx.objectStore(store).put(data);tx.oncomplete=()=>res();tx.onerror=e=>rej(e.target.error)})}
function dbGet(store,key){return new Promise((res,rej)=>{const tx=db.transaction(store,'readonly');const r=tx.objectStore(store).get(key);r.onsuccess=()=>res(r.result||null);r.onerror=e=>rej(e.target.error)})}
function dbGetAll(store){return new Promise((res,rej)=>{const tx=db.transaction(store,'readonly');const r=tx.objectStore(store).getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=e=>rej(e.target.error)})}
function dbDel(store,key){return new Promise((res,rej)=>{const tx=db.transaction(store,'readwrite');tx.objectStore(store).delete(key);tx.oncomplete=()=>res();tx.onerror=e=>rej(e.target.error)})}
function dbClear(store){return new Promise((res,rej)=>{const tx=db.transaction(store,'readwrite');tx.objectStore(store).clear();tx.oncomplete=()=>res();tx.onerror=e=>rej(e.target.error)})}
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,6)}

/* ============================================================
   SETTINGS HELPERS
   ============================================================ */
async function getSetting(key,def){const r=await dbGet('settings',key);return r?r.value:def}
async function setSetting(key,val){await dbPut('settings',{key:key,value:val})}

/* ============================================================
   HELPERS
   ============================================================ */
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function textToHtml(t){return t.split(/\n\n+/).map(p=>'<p>'+esc(p.trim())+'</p>').join('')}
function renderContent(c){if(!c)return'';const html=c.trim().startsWith('<')?c:textToHtml(c);return sanitizeHtml(html)}
function sanitizeHtml(html){
  const doc=new DOMParser().parseFromString(html,'text/html');
  doc.querySelectorAll('script,iframe,object,embed,form,link,meta,base').forEach(el=>el.remove());
  doc.querySelectorAll('*').forEach(el=>{
    Array.from(el.attributes).forEach(a=>{
      const n=a.name.toLowerCase();
      if(n.startsWith('on'))el.removeAttribute(a.name);
      if((n==='href'||n==='src')&&/^(javascript|vbscript):/i.test(a.value.trim()))el.removeAttribute(a.name);
    });
  });
  return doc.body.innerHTML;
}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('visible');setTimeout(()=>t.classList.remove('visible'),2200)}
function openModal(id){document.getElementById(id).classList.add('visible')}
function closeModal(id){document.getElementById(id).classList.remove('visible')}

/* ============================================================
   TAB NAVIGATION
   ============================================================ */
const TABS=['Journal','Dashboard','Studio','Sections','Settings'];
function switchTab(name){
  TABS.forEach(t=>{
    document.getElementById('panel'+t).classList.toggle('active',t===name);
    document.getElementById('tab'+t).classList.toggle('active',t===name);
  });
}

/* Sub-navigation within Sections panel */
function showSub(name){
  document.querySelectorAll('.sub-content').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.sub-btn').forEach(el=>el.classList.remove('active'));
  const map={beliefs:'Beliefs',projects:'Projects',games:'Games',resources:'Resources',connect:'Connect'};
  document.getElementById('sub'+map[name]).classList.add('active');
  event.target.classList.add('active');
}

/* ============================================================
   QUILL EDITOR INSTANCE
   ============================================================ */
const qCfg={theme:'snow',modules:{toolbar:[[{header:[1,2,3,false]}],['bold','italic','underline','strike'],[{list:'ordered'},{list:'bullet'}],['blockquote','code-block'],['link'],['clean']]}};
let editorQuill=null;
function initQuill(){if(!editorQuill)editorQuill=new Quill('#editorQuill',{...qCfg,placeholder:'write here...'})}

/* ============================================================
   GENERIC EDITOR SYSTEM
   ============================================================ */
let editType=null,editId=null;

function openEditor(type,id){
  editType=type;editId=id||null;
  const title=document.getElementById('editorTitle');
  const fields=document.getElementById('editorFields');
  const qw=document.getElementById('editorQuillWrap');
  const err=document.getElementById('editorError');
  err.classList.remove('visible');
  qw.style.display='none';
  fields.innerHTML='';
  initQuill();

  if(type==='entry'){
    title.textContent=id?'Edit Entry':'New Entry';
    fields.innerHTML=mkField('entryTitle','Title','')+mkField('entryDate','Date',new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}));
    qw.style.display='block';
    if(id){dbGet('entries',id).then(d=>{if(d){gf('entryTitle').value=d.title;gf('entryDate').value=d.entry_date;editorQuill.root.innerHTML=d.content||''}})}
    else editorQuill.root.innerHTML='';
  }else if(type==='tile'){
    title.textContent=id?'Edit Tile':'New Tile';
    fields.innerHTML=mkField('tileTitle','Title','');
    qw.style.display='block';
    if(id){dbGet('tiles',id).then(d=>{if(d){gf('tileTitle').value=d.title;editorQuill.root.innerHTML=d.content||''}})}
    else editorQuill.root.innerHTML='';
  }else if(type==='belief'){
    title.textContent=id?'Edit Belief':'New Belief';
    fields.innerHTML=mkField('beliefTitle','Title','')+mkTextarea('beliefContent','Description','');
    if(id)dbGet('beliefs',id).then(d=>{if(d){gf('beliefTitle').value=d.title;gf('beliefContent').value=d.content}});
  }else if(type==='project'){
    title.textContent=id?'Edit Project':'New Project';
    fields.innerHTML=mkField('projTitle','Title','')+mkField('projTags','Tags (comma-separated)','')+mkTextarea('projDesc','Description','')+mkField('projUrl','Link URL','')+mkField('projLinkText','Link Text','view on github →');
    if(id)dbGet('projects',id).then(d=>{if(d){gf('projTitle').value=d.title;gf('projTags').value=d.tags;gf('projDesc').value=d.description;gf('projUrl').value=d.link_url;gf('projLinkText').value=d.link_text}});
  }else if(type==='game'){
    title.textContent=id?'Edit Game':'New Game';
    fields.innerHTML=mkField('gameTitle','Title','')+mkField('gameIcon','Icon (emoji)','')+mkTextarea('gameDesc','Description','')+mkField('gameTags','Tags','')+mkField('gameUrl','URL','');
    if(id)dbGet('games',id).then(d=>{if(d){gf('gameTitle').value=d.title;gf('gameIcon').value=d.icon;gf('gameDesc').value=d.description;gf('gameTags').value=d.tags;gf('gameUrl').value=d.url}});
  }else if(type==='resource'){
    title.textContent=id?'Edit Resource':'New Resource';
    fields.innerHTML=mkSelect('resCat','Category',['courses','tools','docs','videos','books'])+mkField('resTitle','Title','')+mkField('resIcon','Icon (emoji)','')+mkTextarea('resDesc','Description','')+mkField('resUrl','URL','');
    if(id)dbGet('resources',id).then(d=>{if(d){gf('resCat').value=d.category;gf('resTitle').value=d.title;gf('resIcon').value=d.icon;gf('resDesc').value=d.description;gf('resUrl').value=d.url}});
  }else if(type==='social'){
    title.textContent=id?'Edit Link':'New Link';
    fields.innerHTML=mkSelect('socIcon','Platform',['github','x','reddit','linkedin','discord','youtube','twitch','email','website'])+mkField('socName','Display Name','')+mkField('socHandle','Handle','')+mkField('socUrl','URL','');
    if(id)dbGet('socials',id).then(d=>{if(d){gf('socIcon').value=d.icon_key;gf('socName').value=d.name;gf('socHandle').value=d.handle;gf('socUrl').value=d.url}});
  }else if(type==='hero'){
    title.textContent='Edit Hero';
    getSetting('hero_name','malys').then(n=>{
      getSetting('hero_tagline','').then(tl=>{
        getSetting('hero_status','').then(st=>{
          fields.innerHTML=mkField('heroName','Name',n)+mkTextarea('heroTagline','Tagline',tl)+mkField('heroStatus','Status',st);
        });
      });
    });
  }else if(type==='about'){
    title.textContent='Edit About';
    getSetting('about_intro','').then(v=>{fields.innerHTML=mkTextarea('aboutIntro','Intro text',v)});
  }else if(type==='footer'){
    title.textContent='Edit Footer';
    getSetting('footer_line1','').then(l1=>{
      getSetting('footer_line2','').then(l2=>{
        fields.innerHTML=mkField('footerL1','Line 1',l1)+mkField('footerL2','Line 2',l2);
      });
    });
  }
  openModal('editorModal');
}

function closeEditor(){closeModal('editorModal');editType=null;editId=null}
function gf(id){return document.getElementById(id)}
function mkField(id,label,val){return'<label for="'+id+'">'+label+'</label><input type="text" id="'+id+'" value="'+esc(val)+'">' }
function mkTextarea(id,label,val){return'<label for="'+id+'">'+label+'</label><textarea id="'+id+'">'+esc(val)+'</textarea>'}
function mkSelect(id,label,opts){return'<label for="'+id+'">'+label+'</label><select id="'+id+'">'+opts.map(o=>'<option value="'+o+'">'+o+'</option>').join('')+'</select>'}

async function saveEditor(){
  try{
    if(editType==='entry'){
      const title=gf('entryTitle').value.trim(),date=gf('entryDate').value.trim(),content=editorQuill.root.innerHTML.trim();
      if(!title||!date||!content||content==='<p><br></p>'){showErr('All fields required.');return}
      const data={id:editId||uid(),title,entry_date:date,content,created_at:editId?undefined:new Date().toISOString(),updated_at:new Date().toISOString()};
      if(editId){const ex=await dbGet('entries',editId);if(ex)data.created_at=ex.created_at}
      await dbPut('entries',data);closeEditor();loadEntries();showToast(editId?'Updated':'Entry saved');
    }else if(editType==='tile'){
      const title=gf('tileTitle').value.trim(),content=editorQuill.root.innerHTML.trim();
      if(!title||!content||content==='<p><br></p>'){showErr('Title and content required.');return}
      const data={id:editId||uid(),title,content,sort_order:0,created_at:editId?undefined:new Date().toISOString(),updated_at:new Date().toISOString()};
      if(editId){const ex=await dbGet('tiles',editId);if(ex){data.created_at=ex.created_at;data.sort_order=ex.sort_order}}
      await dbPut('tiles',data);closeEditor();loadTiles();showToast(editId?'Updated':'Tile saved');
    }else if(editType==='belief'){
      const title=gf('beliefTitle').value.trim(),content=gf('beliefContent').value.trim();
      if(!title||!content){showErr('Title and description required.');return}
      const all=await dbGetAll('beliefs');const so=all.length?Math.max(...all.map(b=>b.sort_order||0))+1:1;
      const data={id:editId||uid(),title,content,sort_order:editId?(await dbGet('beliefs',editId))?.sort_order||so:so};
      await dbPut('beliefs',data);closeEditor();loadBeliefs();showToast(editId?'Updated':'Belief added');
    }else if(editType==='project'){
      const title=gf('projTitle').value.trim(),tags=gf('projTags').value.trim(),desc=gf('projDesc').value.trim(),url=gf('projUrl').value.trim(),lt=gf('projLinkText').value.trim();
      if(!title||!desc){showErr('Title and description required.');return}
      const all=await dbGetAll('projects');const so=all.length?Math.max(...all.map(p=>p.sort_order||0))+1:1;
      await dbPut('projects',{id:editId||uid(),title,tags,description:desc,link_url:url,link_text:lt,sort_order:editId?(await dbGet('projects',editId))?.sort_order||so:so});
      closeEditor();loadProjects();showToast(editId?'Updated':'Project added');
    }else if(editType==='game'){
      const title=gf('gameTitle').value.trim(),icon=gf('gameIcon').value.trim(),desc=gf('gameDesc').value.trim(),tags=gf('gameTags').value.trim(),url=gf('gameUrl').value.trim();
      if(!title){showErr('Title required.');return}
      const all=await dbGetAll('games');const so=all.length?Math.max(...all.map(g=>g.sort_order||0))+1:1;
      await dbPut('games',{id:editId||uid(),title,icon,description:desc,tags,url,sort_order:editId?(await dbGet('games',editId))?.sort_order||so:so});
      closeEditor();loadGames();showToast(editId?'Updated':'Game added');
    }else if(editType==='resource'){
      const cat=gf('resCat').value,title=gf('resTitle').value.trim(),icon=gf('resIcon').value.trim(),desc=gf('resDesc').value.trim(),url=gf('resUrl').value.trim();
      if(!title||!url){showErr('Title and URL required.');return}
      const all=await dbGetAll('resources');const so=all.length?Math.max(...all.map(r=>r.sort_order||0))+1:1;
      await dbPut('resources',{id:editId||uid(),category:cat,title,icon,description:desc,url,sort_order:editId?(await dbGet('resources',editId))?.sort_order||so:so});
      closeEditor();loadResources();showToast(editId?'Updated':'Resource added');
    }else if(editType==='social'){
      const ik=gf('socIcon').value,name=gf('socName').value.trim(),handle=gf('socHandle').value.trim(),url=gf('socUrl').value.trim();
      if(!name||!url){showErr('Name and URL required.');return}
      const all=await dbGetAll('socials');const so=all.length?Math.max(...all.map(s=>s.sort_order||0))+1:1;
      await dbPut('socials',{id:editId||uid(),icon_key:ik,name,handle,url,sort_order:editId?(await dbGet('socials',editId))?.sort_order||so:so});
      closeEditor();loadSocials();showToast(editId?'Updated':'Link added');
    }else if(editType==='hero'){
      await setSetting('hero_name',gf('heroName').value.trim());
      await setSetting('hero_tagline',gf('heroTagline').value.trim());
      await setSetting('hero_status',gf('heroStatus').value.trim());
      closeEditor();loadHero();showToast('Hero updated');
    }else if(editType==='about'){
      await setSetting('about_intro',gf('aboutIntro').value.trim());
      closeEditor();loadAbout();showToast('About updated');
    }else if(editType==='footer'){
      await setSetting('footer_line1',gf('footerL1').value.trim());
      await setSetting('footer_line2',gf('footerL2').value.trim());
      closeEditor();loadFooter();showToast('Footer updated');
    }
  }catch(e){showErr(e.message||'Save failed')}
}
function showErr(m){const e=document.getElementById('editorError');e.textContent=m;e.classList.add('visible')}

async function deleteItem(store,id,loadFn){
  if(!confirm('Delete this?'))return;
  await dbDel(store,id);loadFn();showToast('Deleted');
}

/* ============================================================
   RENDER FUNCTIONS
   ============================================================ */
function actionBtns(store,id,loadFn){
  return'<div class="card-actions"><button class="btn" onclick="openEditor(\''+store.replace('ies','y').replace(/s$/,'').replace('tile','tile').replace('entrie','entry')+'\',\''+id+'\')">edit</button><button class="btn btn-danger" onclick="deleteItem(\''+store+'\',\''+id+'\','+loadFn+')">delete</button></div>';
}

async function loadEntries(){
  const el=document.getElementById('entriesList');
  const items=(await dbGetAll('entries')).sort((a,b)=>(b.created_at||'').localeCompare(a.created_at||''));
  if(!items.length){el.innerHTML='<p class="empty-msg">no entries yet. tap + to start writing.</p>';return}
  el.innerHTML=items.map(e=>'<div class="card"><div class="card-date">'+esc(e.entry_date)+'</div><div class="card-title">'+esc(e.title)+'</div><div class="rich-content">'+renderContent(e.content)+'</div><div class="card-actions"><button class="btn" onclick="openEditor(\'entry\',\''+e.id+'\')">edit</button><button class="btn btn-danger" onclick="deleteItem(\'entries\',\''+e.id+'\',loadEntries)">delete</button></div></div>').join('');
}

async function loadTiles(){
  const el=document.getElementById('tilesList');
  const items=(await dbGetAll('tiles')).sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
  if(!items.length){el.innerHTML='<p class="empty-msg">no tiles yet.</p>';return}
  el.innerHTML=items.map(t=>'<div class="card"><h3>'+esc(t.title)+'</h3><div class="rich-content">'+renderContent(t.content)+'</div><div class="card-actions"><button class="btn" onclick="openEditor(\'tile\',\''+t.id+'\')">edit</button><button class="btn btn-danger" onclick="deleteItem(\'tiles\',\''+t.id+'\',loadTiles)">delete</button></div></div>').join('');
}

async function loadBeliefs(){
  const el=document.getElementById('beliefsList');
  const items=(await dbGetAll('beliefs')).sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
  if(!items.length){el.innerHTML='<p class="empty-msg">no beliefs yet.</p>';return}
  el.innerHTML=items.map(b=>'<div class="belief-card"><h3>'+esc(b.title)+'</h3><p>'+esc(b.content)+'</p><div class="card-actions"><button class="btn" onclick="openEditor(\'belief\',\''+b.id+'\')">edit</button><button class="btn btn-danger" onclick="deleteItem(\'beliefs\',\''+b.id+'\',loadBeliefs)">delete</button></div></div>').join('');
}

async function loadProjects(){
  const el=document.getElementById('projectsList');
  const items=(await dbGetAll('projects')).sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));

let paintCtx,paintTool='pen',paintColor='#e50000',paintDrawing=false;
let paintHistory=[],paintHistoryIdx=-1;
let paintStartX,paintStartY,paintSnapshot;

function openPaint(){
  document.getElementById('paintOverlay').classList.add('visible');
  const wrap=document.getElementById('paintWrap');
  const canvas=document.getElementById('paintCanvas');
  const w=wrap.clientWidth,h=wrap.clientHeight;
  const dpr=window.devicePixelRatio||1;
  canvas.width=w*dpr;canvas.height=h*dpr;
  canvas.style.width=w+'px';canvas.style.height=h+'px';
  paintCtx=canvas.getContext('2d');
  paintCtx.scale(dpr,dpr);
  /* Load existing painting */
  dbGet('images','hero_painting').then(img=>{
    if(img&&img.data){
      const i=new Image();
      i.onload=function(){paintCtx.drawImage(i,0,0,w,h);pushPaintState()};
      i.src=img.data;
    }else{
      paintCtx.fillStyle='#111';paintCtx.fillRect(0,0,w,h);pushPaintState();
    }
  });
}
function closePaint(){document.getElementById('paintOverlay').classList.remove('visible')}
async function savePainting(){
  const canvas=document.getElementById('paintCanvas');
  const data=canvas.toDataURL('image/png');
  await dbPut('images',{id:'hero_painting',data:data});
  closePaint();loadHero();showToast('Painting saved as hero');
}

function setPaintTool(t){
  paintTool=t;
  document.querySelectorAll('.paint-tool[data-tool]').forEach(el=>el.classList.toggle('active',el.dataset.tool===t));
}
function setPaintColor(el){
  paintColor=el.dataset.color;
  document.querySelectorAll('.paint-color').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
  gf('paintCustomColor').value=paintColor;
}

function pushPaintState(){
  const canvas=document.getElementById('paintCanvas');
  paintHistoryIdx++;
  paintHistory=paintHistory.slice(0,paintHistoryIdx);
  paintHistory.push(canvas.toDataURL());
  if(paintHistory.length>40){paintHistory.shift();paintHistoryIdx--}
}
function paintUndo(){
  if(paintHistoryIdx<=0)return;
  paintHistoryIdx--;restorePaintState();
}
function paintRedo(){
  if(paintHistoryIdx>=paintHistory.length-1)return;
  paintHistoryIdx++;restorePaintState();
}
function restorePaintState(){
  const img=new Image();
  img.onload=function(){
    const canvas=document.getElementById('paintCanvas');
    const w=canvas.style.width.replace('px',''),h=canvas.style.height.replace('px','');
    paintCtx.clearRect(0,0,w,h);paintCtx.drawImage(img,0,0,w,h);
  };
  img.src=paintHistory[paintHistoryIdx];
}
function paintClear(){
  const canvas=document.getElementById('paintCanvas');
  const w=parseInt(canvas.style.width),h=parseInt(canvas.style.height);
  paintCtx.fillStyle='#111';paintCtx.fillRect(0,0,w,h);pushPaintState();
}

/* Touch + mouse drawing */
(function(){
  const canvas=document.getElementById('paintCanvas');
  function pos(e){
    const r=canvas.getBoundingClientRect();
    const t=e.touches?e.touches[0]:e;
    return{x:t.clientX-r.left,y:t.clientY-r.top};
  }
  function down(e){
    e.preventDefault();paintDrawing=true;
    const p=pos(e);paintStartX=p.x;paintStartY=p.y;
    const sz=parseInt(gf('paintSize').value)||3;
    if(paintTool==='pen'||paintTool==='eraser'){
      paintCtx.beginPath();paintCtx.moveTo(p.x,p.y);
      paintCtx.lineWidth=sz;paintCtx.lineCap='round';paintCtx.lineJoin='round';
      paintCtx.strokeStyle=paintTool==='eraser'?'#111111':paintColor;
      paintCtx.globalCompositeOperation=paintTool==='eraser'?'source-over':'source-over';
    }
    if(paintTool==='line'||paintTool==='rect'||paintTool==='circle'){
      paintSnapshot=paintCtx.getImageData(0,0,canvas.width,canvas.height);
    }
  }
  function move(e){
    if(!paintDrawing)return;e.preventDefault();
    const p=pos(e);const sz=parseInt(gf('paintSize').value)||3;
    if(paintTool==='pen'||paintTool==='eraser'){
      paintCtx.lineTo(p.x,p.y);paintCtx.stroke();
    }else if(paintSnapshot){
      paintCtx.putImageData(paintSnapshot,0,0);
      paintCtx.lineWidth=sz;paintCtx.strokeStyle=paintColor;paintCtx.lineCap='round';
      if(paintTool==='line'){paintCtx.beginPath();paintCtx.moveTo(paintStartX,paintStartY);paintCtx.lineTo(p.x,p.y);paintCtx.stroke()}
      else if(paintTool==='rect'){paintCtx.strokeRect(paintStartX,paintStartY,p.x-paintStartX,p.y-paintStartY)}
      else if(paintTool==='circle'){
        const rx=Math.abs(p.x-paintStartX)/2,ry=Math.abs(p.y-paintStartY)/2;
        const cx=paintStartX+(p.x-paintStartX)/2,cy=paintStartY+(p.y-paintStartY)/2;
        paintCtx.beginPath();paintCtx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);paintCtx.stroke();
      }
    }
  }
  function up(e){
    if(!paintDrawing)return;paintDrawing=false;paintSnapshot=null;pushPaintState();
  }
  canvas.addEventListener('mousedown',down);canvas.addEventListener('mousemove',move);
  canvas.addEventListener('mouseup',up);canvas.addEventListener('mouseleave',up);
  canvas.addEventListener('touchstart',down,{passive:false});
  canvas.addEventListener('touchmove',move,{passive:false});
  canvas.addEventListener('touchend',up);canvas.addEventListener('touchcancel',up);
})();

async function exportData(){
  var settingsArr=await dbGetAll('settings');var settings={};
  settingsArr.forEach(function(s){settings[s.key]=s.value});
  var data={format:'malys-transfer-v1',exported_from:'app',exported_at:new Date().toISOString(),settings:settings,beliefs:await dbGetAll('beliefs'),tiles:await dbGetAll('tiles'),projects:await dbGetAll('projects'),games:await dbGetAll('games'),entries:await dbGetAll('entries'),resources:await dbGetAll('resources'),socials:await dbGetAll('socials')};
  data._app_only={images:await dbGetAll('images'),svg_config:await dbGetAll('svg_config')};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);var a=document.createElement('a');
  a.href=url;a.download='malys-journal-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();URL.revokeObjectURL(url);showToast('Data exported');

async function importData(e){
  var file=e.target.files[0];if(!file)return;
  if(!confirm('This will REPLACE all existing data. Continue?')){e.target.value='';return}
  try{
    var text=await file.text();var data=JSON.parse(text);
    if(data.settings){await dbClear('settings');if(Array.isArray(data.settings)){for(var s of data.settings)await dbPut('settings',s)}else{for(var k of Object.keys(data.settings))await dbPut('settings',{key:k,value:data.settings[k]})}}
    var mapping=[['beliefs','beliefs'],['tiles','tiles'],['dashboard_tiles','tiles'],['projects','projects'],['games','games'],['entries','entries'],['journal_entries','entries'],['resources','resources'],['socials','socials'],['social_links','socials']];
    var cleared={};
    for(var m of mapping){if(data[m[0]]&&Array.isArray(data[m[0]])){if(!cleared[m[1]]){await dbClear(m[1]);cleared[m[1]]=true}for(var item of data[m[0]]){delete item.user_id;if(!item.id)item.id=uid();await dbPut(m[1],item)}}}
    if(data._app_only){if(data._app_only.images){await dbClear('images');for(var img of data._app_only.images)await dbPut('images',img)}if(data._app_only.svg_config){await dbClear('svg_config');for(var cfg of data._app_only.svg_config)await dbPut('svg_config',cfg)}}
    loadAll();showToast('Data imported');
  }catch(err){showToast('Import failed: '+err.message)}
  e.target.value='';
}
async function mergeData(e){
  var file=e.target.files[0];if(!file)return;
  try{
    var text=await file.text();var data=JSON.parse(text);
    if(data.settings){if(Array.isArray(data.settings)){for(var s of data.settings)await dbPut('settings',s)}else{for(var k of Object.keys(data.settings))await dbPut('settings',{key:k,value:data.settings[k]})}}
    function getTs(item){return item.updated_at||item.created_at||item.id||''}
    function isNewer(a,b){return getTs(a)>getTs(b)}
    async function mergeStore(sourceKey,storeName){
      var incoming=data[sourceKey]||[];if(!incoming.length)return{added:0,updated:0};
      var current=await dbGetAll(storeName);var existing={};
      current.forEach(function(item){existing[item.id]=item});
      var added=0,updated=0;
      for(var item of incoming){var copy=Object.assign({},item);delete copy.user_id;if(!copy.id)copy.id=uid();
        if(!existing[copy.id]){await dbPut(storeName,copy);added++}
        else if(isNewer(copy,existing[copy.id])){var merged=Object.assign({},existing[copy.id],copy);await dbPut(storeName,merged);updated++}}
      return{added:added,updated:updated};
    }
    var merges=[['beliefs','beliefs'],['tiles','tiles'],['dashboard_tiles','tiles'],['projects','projects'],['games','games'],['entries','entries'],['journal_entries','entries'],['resources','resources'],['socials','socials'],['social_links','socials']];
    var counts={added:0,updated:0};
    for(var m of merges){if(data[m[0]]&&Array.isArray(data[m[0]])){var r=await mergeStore(m[0],m[1]);counts.added+=r.added;counts.updated+=r.updated}}
    if(data._app_only){if(data._app_only.images)for(var img of data._app_only.images)await dbPut('images',img);if(data._app_only.svg_config)for(var cfg of data._app_only.svg_config)await dbPut('svg_config',cfg)}
    loadAll();showToast('Merged: '+counts.added+' added, '+counts.updated+' updated');
  }catch(err){showToast('Merge failed: '+err.message)}
  e.target.value='';
}
async function clearAllData(){
  if(!confirm('Delete ALL data? This cannot be undone.'))return;
  if(!confirm('Are you sure? Everything will be gone.'))return;
  for(const s of STORES)await dbClear(s);
  loadAll();showToast('All data cleared');
}

   ============================================================ */
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}

   ============================================================ */
function loadAll(){loadEntries();loadTiles();loadBeliefs();loadProjects();loadGames();loadResources();loadSocials();loadHero();loadAbout();loadFooter()}
openDB().then(()=>loadAll()).catch(e=>console.error('DB error:',e));
